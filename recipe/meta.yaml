{% set python_min = "3.10" %}
{% set name = "amep" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/amep-{{ version }}.tar.gz
  sha256: a7e893d3338a2e3c078df6d714e330bd3f864d1166670d1d913f2fa3a73e45ff

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - pip
  run:
    - python >={{ python_min }}
    - h5py >=3.7.0
    - matplotlib-base >=3.6.2
    - numba >=0.56.4
    - numpy >=1.26.6
    - scipy >=1.10.0
    - scikit-image >=0.20.0
    - tqdm >=4.65.0
    - gsd >=3.2.0
    - chemfiles >=0.10.4

test:
  imports:
    - amep
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Active Matter Evaluation Package for data analysis of active matter simulations
  license: GPL-3.0
  license_file:
    - LICENSE
    - LICENSES.third-party
  home: https://amepproject.de/
  dev_url: https://github.com/amepproject/amep
  doc_url: https://amepproject.de/
  description: |
    AMEP is a Python library that focuses on the fast and user-friendly analysis of active 
    and soft matter simulations. It can natively analyze data from molecular dynamics, 
    Brownian dynamics, and continuum simulations from software such as LAMMPS, HOOMD-blue, 
    and GROMACS.
    
    With a plethora of methods for calculating observables and visualizing results, AMEP 
    is suitable for calculating complex observables equally for advanced studies of active 
    and soft matter, as well as for beginners in the field. Computationally intensive 
    methods are parallelized to run on systems ranging from laptops and workstations to 
    high-performance computing clusters.
    
    AMEP utilizes the simplicity of NumPy for users to extract data from the internal 
    functions, which allows for easy extension and individualization of analyses and 
    handling of results and data with existing Python workflows. Additionally, AMEP 
    provides an efficient data format for saving both simulation data and analysis 
    results in a binary file based on the well-established HDF5 file format.
    
    The methods range from correlation functions and order parameters to cluster 
    detection and coarse-graining methods. Examples and the documentation can be 
    found on our homepage amepproject.de. AMEP can be installed via pip and conda.

extra:
  recipe-maintainers:
    - kay-ro
